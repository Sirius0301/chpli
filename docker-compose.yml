version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chpli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chpli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chpli_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chpli}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chpli}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chpli-network

  # Calendar Memo - Web Frontend
  calendar-memo-web:
    build:
      context: .
      dockerfile: apps/calendar-memo/web/Dockerfile
    container_name: chpli-calendar-memo-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3001
    ports:
      - "${CALENDAR_MEMO_WEB_PORT:-5173}:80"
    depends_on:
      - calendar-memo-server
    networks:
      - chpli-network

  # Calendar Memo - Backend Server
  calendar-memo-server:
    build:
      context: .
      dockerfile: apps/calendar-memo/server/Dockerfile
    container_name: chpli-calendar-memo-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
    volumes:
      - calendar_memo_uploads:/app/uploads
    ports:
      - "${CALENDAR_MEMO_SERVER_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chpli-network

volumes:
  postgres_data:
    name: chpli_postgres_data
  calendar_memo_uploads:
    name: chpli_calendar_memo_uploads

networks:
  chpli-network:
    name: chpli-network
    driver: bridge
