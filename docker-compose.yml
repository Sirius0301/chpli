version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: chpli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chpli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chpli_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chpli}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chpli}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chpli-network

  # 数据库迁移服务 - 为已完成的备忘录生成 completion 记录
  # 使用方法: docker-compose --profile migrate up db-migrate
  db-migrate:
    image: node:20-alpine
    container_name: chpli-db-migrate
    working_dir: /app/apps/calendar-memo/server
    command: >
      sh -c "
        set -e &&
        echo '========================================' &&
        echo '  Calendar Memo 数据迁移工具' &&
        echo '========================================' &&
        echo '' &&
        echo '⏳ 等待数据库就绪...' &&
        apk add --no-cache postgresql-client > /dev/null 2>&1 &&
        until pg_isready -h postgres -U ${POSTGRES_USER:-chpli} > /dev/null 2>&1; do
          echo '  等待 PostgreSQL...'
          sleep 2
        done &&
        echo '✅ 数据库已就绪' &&
        echo '' &&
        echo '⏳ 安装依赖...' &&
        npm install -g pnpm > /dev/null 2>&1 &&
        pnpm install > /dev/null 2>&1 &&
        echo '✅ 依赖安装完成' &&
        echo '' &&
        echo '⏳ 生成 Prisma Client...' &&
        npx prisma generate > /dev/null 2>&1 &&
        echo '✅ Prisma Client 生成完成' &&
        echo '' &&
        echo '⏳ 运行数据迁移脚本...' &&
        echo '' &&
        npx tsx scripts/migrate-memo-completions.ts &&
        echo '' &&
        echo '✅ 所有操作已完成'
      "
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}?schema=public
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/calendar-memo/server/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chpli-network
    profiles:
      - migrate  # 只在指定时运行: docker-compose --profile migrate up db-migrate
    restart: "no"  # 只运行一次，不重启

  # Backend Server
  server:
    build:
      context: .
      dockerfile: apps/calendar-memo/server/Dockerfile
    container_name: chpli-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}?schema=public
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      # db-migrate 不是强依赖，server 可以独立启动
    networks:
      - chpli-network

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/calendar-memo/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
    container_name: chpli-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - server
    networks:
      - chpli-network

volumes:
  postgres_data:
    name: chpli_postgres_data

networks:
  chpli-network:
    driver: bridge
