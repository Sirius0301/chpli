version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: chpli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chpli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chpli_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chpli}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chpli}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chpli-network

  # Backend Server
  server:
    build:
      context: .
      dockerfile: apps/calendar-memo/server/Dockerfile
    container_name: chpli-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}?schema=public
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chpli-network

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/calendar-memo/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
    container_name: chpli-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - server
    networks:
      - chpli-network

volumes:
  postgres_data:
    name: chpli_postgres_data

networks:
  chpli-network:
    driver: bridge
