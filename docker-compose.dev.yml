version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: chpli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chpli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chpli_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chpli}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chpli}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chpli-network

  # 数据库迁移服务 - 为已完成的备忘录生成 completion 记录
  # 使用方法: docker-compose -f docker-compose.dev.yml --profile migrate up db-migrate
  db-migrate:
    image: node:20-alpine
    container_name: chpli-db-migrate
    working_dir: /app/apps/calendar-memo/server
    command: >
      sh -c "
        set -e &&
        echo '========================================' &&
        echo '  Calendar Memo 数据迁移工具 (Dev)' &&
        echo '========================================' &&
        echo '' &&
        echo '⏳ 等待数据库就绪...' &&
        apk add --no-cache postgresql-client &&
        until pg_isready -h postgres -U ${POSTGRES_USER:-chpli} > /dev/null 2>&1; do
          echo '  等待 PostgreSQL...'
          sleep 2
        done &&
        echo '✅ 数据库已就绪' &&
        echo '' &&
        echo '⏳ 安装依赖...' &&
        npm install -g pnpm &&
        pnpm install &&
        echo '✅ 依赖安装完成' &&
        echo '' &&
        echo '⏳ 安装 Prisma CLI...' &&
        pnpm add -D prisma &&
        echo '✅ Prisma CLI 安装完成' &&
        echo '' &&
        echo '⏳ 生成 Prisma Client...' &&
        npx prisma generate &&
        echo '✅ Prisma Client 生成完成' &&
        echo '' &&
        echo '⏳ 运行数据迁移脚本...' &&
        echo '' &&
        npx tsx scripts/migrate-memo-completions.ts &&
        echo '' &&
        echo '✅ 所有操作已完成'
      "
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}?schema=public
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/calendar-memo/server/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chpli-network
    profiles:
      - migrate  # 只在指定时运行: docker-compose --profile migrate up db-migrate
    restart: "no"  # 只运行一次，不重启

  # Calendar Memo - Backend Server (开发模式)
  calendar-memo-server:
    image: node:20-alpine
    container_name: chpli-calendar-memo-server
    working_dir: /app/apps/calendar-memo/server
    command: sh -c "apk add --no-cache openssl && npm install -g pnpm && pnpm install && npx prisma generate && pnpm dev"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}?schema=public
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    ports:
      - "${CALENDAR_MEMO_SERVER_PORT:-3001}:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/calendar-memo/server/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chpli-network

  # Calendar Memo - Web 前端 (开发模式)
  calendar-memo-web:
    image: node:20-alpine
    container_name: chpli-calendar-memo-web
    working_dir: /app/apps/calendar-memo/web
    command: sh -c "npm install -g pnpm && pnpm install && npx vite --host"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
    ports:
      - "${CALENDAR_MEMO_WEB_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/calendar-memo/web/node_modules
    depends_on:
      - calendar-memo-server
    networks:
      - chpli-network

volumes:
  postgres_data:
    name: chpli_postgres_data

networks:
  chpli-network:
    name: chpli-network
    driver: bridge
