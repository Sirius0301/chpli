version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: chpli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chpli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chpli_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chpli}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chpli}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chpli-network

  # Calendar Memo - Backend Server (开发模式)
  calendar-memo-server:
    image: node:20-alpine
    container_name: chpli-calendar-memo-server
    working_dir: /app/apps/calendar-memo/server
    command: sh -c "apk add --no-cache openssl && npm install -g pnpm && pnpm install && npx prisma generate && pnpm dev"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}?schema=public
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    ports:
      - "${CALENDAR_MEMO_SERVER_PORT:-3001}:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/calendar-memo/server/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chpli-network

  # Calendar Memo - Web 前端 (开发模式)
  calendar-memo-web:
    image: node:20-alpine
    container_name: chpli-calendar-memo-web
    working_dir: /app/apps/calendar-memo/web
    command: sh -c "npm install -g pnpm && pnpm install && npx vite --host"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
    ports:
      - "${CALENDAR_MEMO_WEB_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/calendar-memo/web/node_modules
    depends_on:
      - calendar-memo-server
    networks:
      - chpli-network

volumes:
  postgres_data:
    name: chpli_postgres_data

networks:
  chpli-network:
    name: chpli-network
    driver: bridge
