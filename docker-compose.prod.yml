version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: chpli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chpli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chpli_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chpli}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地访问，不暴露到公网
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chpli}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chpli-network

  # Calendar Memo - Backend Server
  calendar-memo-server:
    build:
      context: .
      dockerfile: apps/calendar-memo/server/Dockerfile
    container_name: chpli-calendar-memo-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-chpli}:${POSTGRES_PASSWORD:-chpli_secret}@postgres:5432/${POSTGRES_DB:-chpli}?schema=public
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production-min-32-chars}
      # 允许所有 IP 访问（生产环境建议配置具体 IP）
      - CORS_ORIGIN=*
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chpli-network

  # Calendar Memo - Web 前端
  calendar-memo-web:
    build:
      context: .
      dockerfile: apps/calendar-memo/web/Dockerfile
      args:
        # 构建时传入 API URL（使用服务器 IP 或域名）
        - VITE_API_URL=${VITE_API_URL:-http://SERVER_IP:3001}
    container_name: chpli-calendar-memo-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "80:80"
    depends_on:
      - calendar-memo-server
    networks:
      - chpli-network

volumes:
  postgres_data:
    name: chpli_postgres_data

networks:
  chpli-network:
    name: chpli-network
    driver: bridge
